name: Full Prism Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      issue_key:
        description: 'Jira Issue Key (e.g., ZT-3)'
        required: true
        default: 'ZT-3'
        type: string

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Playwright
        run: npx playwright install --with-deps
        continue-on-error: true

      - name: Run Prism Pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          ZEPHYR_API_TOKEN: ${{ secrets.ZEPHYR_API_TOKEN }}
          ZEPHYR_PROJECT_KEY: ${{ secrets.ZEPHYR_PROJECT_KEY }}
          ZEPHYR_BASE_URL: https://prod-api.zephyr4jiracloud.com/v2
          AI_PROVIDER: groq
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ISSUE_KEY="${{ github.event.inputs.issue_key }}"
          else
            ISSUE_KEY="ZT-3"
          fi
          echo "Running pipeline for issue: $ISSUE_KEY"
          python -m src.pipeline.enhanced_pipeline jira "$ISSUE_KEY" --framework playwright

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            generated_tests/
            data/

      - name: Generate dashboard
        if: always()
        run: |
          python -c "
          from src.dashboard.metrics_tracker import MetricsTracker
          import json
          tracker = MetricsTracker()
          dashboard = tracker.generate_dashboard_data()
          with open('dashboard.json', 'w') as f:
              json.dump(dashboard, f, indent=2)
          print('Dashboard generated')
          "

      - name: Upload dashboard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard
          path: dashboard.json